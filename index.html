<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bauabnahmeprotokoll</title>

<script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.7/dist/signature_pad.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{font-family:Segoe UI,Roboto,Arial,sans-serif;background:#f3f4f6;margin:0}
.container{max-width:800px;margin:20px auto;background:#fff;padding:26px;border-radius:14px}

fieldset{border:none;padding:16px 0 22px;margin-bottom:22px;border-bottom:1px solid #e3e3e3}
legend{font-weight:600;color:#0a3d62;font-size:16px}
label{display:block;margin-top:10px;font-size:14px}

input,select,textarea{
  width:100%;
  padding:6px 8px;
  height:34px;
  line-height:20px;
  box-sizing:border-box;
  border-radius:6px;
  border:1px solid #cfcfcf;
  font-size:14px;
}
textarea{min-height:70px;height:auto}

.row{display:flex;gap:10px}
.row div{flex:1}

canvas{
  width:100%;
  height:140px;
  border:2px dashed #0a3d62;
  border-radius:8px;
}

button.main{
  background:#0a3d62;
  color:white;
  padding:14px;
  border:none;
  font-size:16px;
  border-radius:10px;
  width:100%;
  cursor:pointer;
}

.smallbtn{
  background:#999;
  color:white;
  border:none;
  padding:6px 14px;
  border-radius:6px;
  margin-top:8px;
  cursor:pointer;
}
</style>
</head>

<body>
<div class="container">
<h2>🔧 Bauabnahmeprotokoll Sichtwerk</h2>

<div id="formSection">

<fieldset>
<legend>👤 1. Projekt- und Kundendaten</legend>
<label>Kunde</label>
<input id="kundeInput" placeholder="">
<label>Adresse</label><input>
<label>Telefon / E-Mail</label><input>
<div class="row">
<div><label>Auftragsnr.</label><input></div>
<div><label>Montagedatum</label><input type="date"></div>
</div>
<label>Objektadresse</label><input>
</fieldset>

<fieldset>
<legend>🛠️ 2. Leistungsbeschreibung</legend>
<select>
<option>Fenster</option>
<option>Türen</option>
<option>Fenster & Türen</option>
<option>Rollos</option>
</select>
</fieldset>

<fieldset>
<legend>✅ 3. Prüfung</legend>
<select>
<option>Ja</option>
<option>Nein</option>
<option>Teilweise</option>
</select>
</fieldset>

<fieldset>
<legend>⚠️ 4. Dokumentierte Mängel</legend>
<textarea></textarea>
</fieldset>

<fieldset>
<legend>📄 5. Abnahme</legend>
<select>
<option>Ohne Vorbehalt</option>
<option>Unter Vorbehalt</option>
<option>Abnahme verweigert</option>
</select>
</fieldset>

</div>

<div id="signSection" style="padding-bottom:30mm">
<fieldset>
<legend>✍️ 6. Unterschriften</legend>

<div class="row">
<div><label>Ort</label><input></div>
<div><label>Datum</label><input type="date"></div>
</div>

<label>Unterschrift Auftraggeber</label>
<canvas id="sig"></canvas>
<button class="smallbtn" onclick="signaturePad.clear()">Löschen</button>

<label>Unterschrift Auftragnehmer</label>
images/unterschrift_auftragnehmer.jpg.jpg
</fieldset>
</div>

<button class="main" onclick="generatePDF()">📄 PDF erstellen</button>
</div>

<script>
const canvas=document.getElementById("sig");
const r=Math.max(window.devicePixelRatio||1,1);
canvas.width=canvas.offsetWidth*r;
canvas.height=canvas.offsetHeight*r;
canvas.getContext("2d").setTransform(r,0,0,r,0,0);
const signaturePad=new SignaturePad(canvas,{backgroundColor:"white"});
</script>

<script>
async function generatePDF(){
  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF("p","mm","a4");

  const form=document.getElementById("formSection");
  const sign=document.getElementById("signSection");

  sign.style.display="none";
  await addPages(pdf,fakeCrop(await html2canvas(form,{scale:0.95})));

  sign.style.display="block";
  pdf.addPage();

  const sc = await html2canvas(sign,{scale:0.95});
  pdf.addImage(sc.toDataURL("image/jpeg",0.9),"JPEG",15,12,180,sc.height*180/sc.width);

  addPageNumbers(pdf);

  const kunde=document.getElementById("kundeInput").value.trim();
  const safe=kunde?kunde.replace(/[^a-z0-9]/gi,"_"):"Unbekannt";
  pdf.save(`Bauabnahmeprotokoll_${safe}.pdf`);
}

function fakeCrop(canvas){
  const ctx=canvas.getContext("2d");
  return canvas;
}

async function addPages(pdf,c){
  const img=c.toDataURL("image/jpeg",0.9);
  const w=180,pageH=270;
  let h=c.height*w/c.width;
  let y=15;

  pdf.addImage(img,"JPEG",15,y,w,h);

  while(h+y>pageH+15){
    const rest=h+y-pageH;
    if(rest<12) break;
    y-=pageH;
    pdf.addPage();
    pdf.addImage(img,"JPEG",15,y,w,h);
  }
}

function addPageNumbers(pdf){
  const n=pdf.getNumberOfPages();
  for(let i=1;i<=n;i++){
    pdf.setPage(i);
    pdf.setFontSize(9);
    pdf.text(`Seite ${i} von ${n}`,200,292,{align:"right"});
  }
}
</script>

</body>
</html>
