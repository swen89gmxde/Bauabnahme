<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bauabnahmeprotokoll</title>

<script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.7/dist/signature_pad.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{font-family:Segoe UI,Roboto,Arial,sans-serif;background:#f3f4f6;margin:0}
.container{max-width:800px;margin:20px auto;background:#fff;padding:26px;border-radius:14px}
h2{margin-top:0}

fieldset{
  border:none;
  padding:16px 0 22px;
  margin-bottom:18px;
  border-bottom:1px solid #e3e3e3;
}
legend{font-weight:600;color:#0a3d62;font-size:16px}
label{display:block;margin-top:8px;font-size:14px}

input,select,textarea{
  width:100%;
  padding:5px 8px;
  height:30px;
  line-height:18px;
  box-sizing:border-box;
  border-radius:6px;
  border:1px solid #cfcfcf;
  font-size:14px;
}
input[type="date"]{height:28px}
textarea{min-height:70px;height:auto}

.row{display:flex;gap:10px}
.row div{flex:1}

canvas{
  width:100%;
  height:140px;
  border:2px dashed #0a3d62;
  border-radius:8px;
}

button.main{
  background:#0a3d62;
  color:#fff;
  padding:14px;
  border:none;
  font-size:16px;
  border-radius:10px;
  width:100%;
  cursor:pointer;
}
.smallbtn{
  background:#999;
  color:#fff;
  border:none;
  padding:6px 14px;
  border-radius:6px;
  margin-top:8px;
  cursor:pointer;
}
</style>
</head>

<body>
<div class="container">
<h2>🔧 Bauabnahmeprotokoll Sichtwerk</h2>

<!-- ===== SEITE 1: PUNKT 1 + 2 ===== -->
<div id="page1">

<fieldset>
<legend>👤 1. Projekt- und Kundendaten</legend>
<label>Kunde</label><input id="kundeInput">
<label>Adresse</label><input>
<label>Telefon / E-Mail</label><input>
<div class="row">
  <div><label>Auftragsnr.</label><input></div>
  <div><label>Montagedatum</label><input type="date"></div>
</div>
<label>Objektadresse</label><input>
</fieldset>

<fieldset>
<legend>🛠️ 2. Leistungsbeschreibung</legend>
<select>
  <option>Fenster</option>
  <option>Türen</option>
  <option>Fenster & Türen</option>
  <option>Rollos</option>
  <option>Nachjustierung</option>
</select>
</fieldset>

</div>

<!-- ===== SEITE 2: PUNKT 3–5 ===== -->
<div id="page2">

<fieldset>
<legend>✅ 3. Prüfung</legend>
<select>
  <option>Ja</option>
  <option>Nein</option>
  <option>Teilweise</option>
</select>
</fieldset>

<fieldset>
<legend>⚠️ 4. Dokumentierte Mängel</legend>
<textarea></textarea>
</fieldset>

<fieldset>
<legend>📄 5. Abnahme</legend>
<select>
  <option>Ohne Vorbehalt</option>
  <option>Unter Vorbehalt</option>
  <option>Abnahme verweigert</option>
</select>
</fieldset>

</div>

<!-- ===== SEITE 3: UNTERSCHRIFTEN ===== -->
<div id="signSection" style="padding-bottom:30mm">
<fieldset>
<legend>✍️ 6. Unterschriften</legend>

<div class="row">
  <div><label>Ort</label><input></div>
  <div><label>Datum</label><input type="date"></div>
</div>

<label>Unterschrift Auftraggeber</label>
<canvas id="sig"></canvas>
<button type="button" class="smallbtn" onclick="signaturePad.clear()">Löschen</button>

<label>Unterschrift Auftragnehmer</label>
<img src="images/unterschrift_auftragnehmer.jpg.jpg" style="width:100%;max-height:140px;object-fit:contain">
</fieldset>
</div>

<button class="main" onclick="generatePDF()">📄 PDF erstellen</button>
</div>

<script>
const sigCanvas=document.getElementById("sig");
const r=Math.max(window.devicePixelRatio||1,1);
sigCanvas.width=sigCanvas.offsetWidth*r;
sigCanvas.height=sigCanvas.offsetHeight*r;
sigCanvas.getContext("2d").setTransform(r,0,0,r,0,0);
const signaturePad=new SignaturePad(sigCanvas,{backgroundColor:"white"});

async function generatePDF(){
  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF("p","mm","a4");

  const page1=document.getElementById("page1");
  const page2=document.getElementById("page2");
  const sign=document.getElementById("signSection");

  // Seite 1
  let c1=await html2canvas(page1,{scale:1.6});
  pdf.addImage(c1.toDataURL("image/jpeg",0.95),"JPEG",15,15,180,c1.height*180/c1.width);

  // Seite 2
  pdf.addPage();
  let c2=await html2canvas(page2,{scale:1.6});
  pdf.addImage(c2.toDataURL("image/jpeg",0.95),"JPEG",15,15,180,c2.height*180/c2.width);

  // Seite 3
  pdf.addPage();
  let c3=await html2canvas(sign,{scale:1.6});
  pdf.addImage(c3.toDataURL("image/jpeg",0.95),"JPEG",15,15,180,c3.height*180/c3.width);

  const kunde=document.getElementById("kundeInput").value.trim();
  const safe=kunde?kunde.replace(/[^a-z0-9]/gi,"_"):"Unbekannt";
  const pages=pdf.getNumberOfPages();
  for(let i=1;i<=pages;i++){
    pdf.setPage(i);
    pdf.setFontSize(9);
    pdf.text(`Seite ${i} von ${pages}`,200,292,{align:"right"});
  }

  pdf.save(`Bauabnahmeprotokoll_${safe}.pdf`);
}
</script>

</body>
</html>
